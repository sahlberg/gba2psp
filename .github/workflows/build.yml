name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pillow requests pytubefix pygubu pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile gba2psp.py
        pyinstaller --onefile --add-data "gba2psp-ui.ui;." --windowed gba2psp-ui.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: gba2psp-windows-build
        path: dist/
